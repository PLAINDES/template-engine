name: Deploy — Template Engine

on:
  push:
    branches: ["main"]

concurrency:
  group: template-engine-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env
        run: echo "${{ secrets.ENV_PROD }}" > ./.env

      - name: Sync al servidor
        run: |
          mkdir -p /home/ubuntu/projects/proproject/template-engine
          rsync -av --delete ./ /home/ubuntu/projects/proproject/template-engine/

      - name: Build and run
        run: |
          cd /home/ubuntu/projects/proproject/template-engine
          docker compose -f docker-compose.production.yml --env-file .env build --no-cache
          docker compose -f docker-compose.production.yml --env-file .env up -d --remove-orphans

      - name: Limpiar imágenes huérfanas
        if: always()
        run: docker image prune -f
